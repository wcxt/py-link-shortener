<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - URL Shortener</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin: 5px 0;
        }

        .error-code {
            font-size: 48px;
            font-weight: bold;
            color: #cc0000;
        }

        .short-code {
            margin-top: 10px;
            font-weight: bold;
            color: #333;
        }

        a {
            margin-top: 20px;
            padding: 10px 16px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }

        a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="error-code">404</div>
    <h1>Link Not Found</h1>

    <p>The short URL you requested does not exist.</p>

    <a href="/">Go Back Home</a>
</body>
</html>
