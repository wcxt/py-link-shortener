<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f4f4f9;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
		}

		h1 {
			color: #333;
		}

		form {
			display: flex;
			flex-direction: column;
			width: 100%;
			max-width: 400px;
			margin-top: 20px;
		}

		input[type="email"],
		input[type="password"] {
			padding: 10px;
			font-size: 16px;
			margin-bottom: 10px;
			border-radius: 4px;
			border: 1px solid #ccc;
		}

		input[type="submit"] {
			padding: 10px;
			font-size: 16px;
			background-color: #4CAF50;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
		}

		input[type="submit"]:hover {
			background-color: #45a049;
		}

		.error {
			color: red;
			margin-top: 10px;
			font-weight: bold;
		}

		.result {
			margin-top: 15px;
			color: green;
		}
	</style>
</head>

<body>
	<h1>Login</h1>

	<div id="error" class="error"></div>
	<div id="result" class="result"></div>

	<form id="login-form">
		<input type="email" id="email" name="username" placeholder="Enter your email" required>
		<input type="password" id="password" name="password" placeholder="Enter your password" required
			minlength="6" maxlength="64">
		<input type="submit" value="Login">
	</form>
</body>

<script type="module" src="static/login.js"></script>

</html>
