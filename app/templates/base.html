<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}URL Shortener{% endblock %}</title>

    <style>
        :root {
            --bg: #f4f4f9;
            --card: #ffffff;
            --text: #333;
            --green: #4CAF50;
            --green-hover: #3e9442;
            --red: #e74c3c;
            --red-hover: #c0392b;
            --shadow: 0 2px 10px rgba(0, 0, 0, 0.08);
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Scoped navbar styles */
        .navbar {
            width: min(1100px, 95%);
            margin-top: 16px;
            background: var(--card);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            border-radius: var(--radius);
            flex-wrap: wrap;
            gap: 10px;
        }

        .navbar .nav-left {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .navbar .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .navbar .nav-right a {
            text-decoration: none;
            font-size: 14px;
            color: var(--green);
            padding: 6px 10px;
            border-radius: 6px;
            transition: 0.2s ease;
        }

        .navbar .nav-right a:hover {
            background: rgba(76, 175, 80, 0.1);
        }

        .navbar .logout-btn {
            background: var(--red);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s ease;
        }

        .navbar .logout-btn:hover {
            background: var(--red-hover);
        }

        /* Mobile adjustments for navbar */
        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .navbar .nav-right {
                width: 100%;
                justify-content: flex-start;
            }
        }

        .content {
            margin-top: 40px;
            width: min(1100px, 95%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        {% block styles %}{% endblock %}
    </style>
</head>

<body>
    <div class="navbar">
        <div class="nav-left">
            <a href="/" style="text-decoration: none; color: inherit;">URL Shortener</a>
        </div>

        <div class="nav-right">
            {% if current_user %}
            <a href="/dashboard">Dashboard</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
            {% else %}
            <a href="/login">Login</a>
            <a href="/register">Register</a>
            {% endif %}
        </div>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</body>

<script src="static/utils.js"></script>
{% block scripts %}{% endblock %}

</html>
